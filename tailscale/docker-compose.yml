services:
  tailscale-subnet-router:
    image: tailscale/tailscale:latest
    container_name: ${TS_CONTAINER_NAME:-tailscale-subnet-router}
    hostname: ${TS_HOSTNAME}
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_HOSTNAME=${TS_HOSTNAME}
      - TS_ROUTES=${TS_ROUTES:-}
      - TS_ACCEPT_ROUTES=${TS_ACCEPT_ROUTES:-false}
      - TS_ACCEPT_DNS=${TS_ACCEPT_DNS:-false}
      - TS_USERSPACE=${TS_USERSPACE:-false}
      - TS_DEBUG_FIREWALL_MODE=${TS_DEBUG_FIREWALL_MODE:-nftables}
      - TS_EXTRA_ARGS=--login-server=${TS_LOGIN_SERVER} --stateful-filtering=false ${TS_EXTRA_ARGS:-}
      - TS_DEST_IP=${TS_DEST_IP:-}
      # State-of-the-art timezone injection
      - TZ=${TZ:-Europe/Berlin}
    volumes:
      - ${TS_DATA_DIR:-/home/${USER:-trasba}/.trasba/docker/tailscale/data}:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
      - /lib/modules:/lib/modules:ro
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    privileged: false
    restart: unless-stopped
    networks:
      - tailscale_bridge

networks:
  tailscale_bridge:
    name: tailscale_bridge
    driver: bridge
    enable_ipv6: true